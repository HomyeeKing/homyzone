<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#c9a86c">
  <meta name="msapplication-TileColor" content="#c9a86c">
  <meta name="theme-color" content="#f5f5f5">
  <meta name="description" content="Opinionated Vite Starter Template">
  <meta name="referrer" content="origin-when-cross-origin">
  <title>HOMYZONE</title>
  <!-- 预加载评论系统 -->
  <link rel="preconnect" href="https://giscus.app">
  <link rel="dns-prefetch" href="https://giscus.app">
  <link rel="preconnect" href="https://homyzone.disqus.com">
  <link rel="dns-prefetch" href="https://homyzone.disqus.com">
  <link rel="preconnect" href="https://disqus.com">
</head>
<body>
  <div id="app"></div>
  <script>
    (function() {
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
      const setting = localStorage.getItem('color-schema') || 'auto'
      if (setting === 'dark' || (prefersDark && setting !== 'light'))
        document.documentElement.classList.toggle('dark', true)
    })()
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
