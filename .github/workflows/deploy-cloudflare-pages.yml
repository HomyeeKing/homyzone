name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  schedule:
    # 每周一凌晨 3:00 UTC (北京时间周一上午 11:00)
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Fetch NeoDB data
        env:
          VITE_NEODB_TOKEN: ${{ secrets.VITE_NEODB_TOKEN }}
        run: pnpm run fetch-data
        
      - name: Build site
        run: pnpm run build
        
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=homyzone
